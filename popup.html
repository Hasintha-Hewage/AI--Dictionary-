<!doctype html>
<html>
  <head>
    <style>
      body {
        width: 400px;
        padding: 15px;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
      }
      h2 {
        color: #333;
        margin-top: 0;
      }
      .input-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
      }
      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 14px;
      }
      input[type="password"]:focus,
      input[type="text"]:focus {
        outline: none;
        border-color: #4caf50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
      }
      button {
        background-color: #4caf50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        width: 100%;
      }
      button:hover {
        background-color: #45a049;
      }
      .message {
        margin-top: 10px;
        padding: 10px;
        border-radius: 4px;
        text-align: center;
        font-size: 14px;
      }
      .success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .info {
        background-color: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 4px;
        font-size: 13px;
      }
      a {
        color: #0c5460;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h2>AI Dictionary Settings</h2>

    <div class="info">
      <strong>How to get API Key:</strong><br />
      1. Go to
      <a href="https://makersuite.google.com/app/apikey" target="_blank"
        >Google AI Studio</a
      ><br />
      2. Create a new API key<br />
      3. Copy and paste it below
    </div>

    <div class="input-group">
      <label for="apiKey">Google Gemini API Key:</label>
      <input
        type="password"
        id="apiKey"
        placeholder="Enter your Google Gemini API Key"
      />
    </div>

    <div class="input-group">
      <label for="modelSelect">AI Model:</label>
      <select
        id="modelSelect"
        style="
          width: 100%;
          padding: 8px;
          border: 1px solid #ddd;
          border-radius: 4px;
          font-size: 14px;
        "
      >
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
        <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite</option>
        <option value="gemini-3-flash">Gemini 3 Flash</option>
        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
        <option value="gemini-3.1-pro">Gemini 3.1 Pro</option>
        <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        <option value="gemma-3-1b">Gemma 3 1B</option>
      </select>
    </div>

    <button id="saveBtn">Save API Key</button>
    <button id="toggleBtn" style="margin-top: 8px; background-color: #2196f3">
      Show Key
    </button>

    <div id="message"></div>

    <script src="popup.js"></script>
  </body>
</html>
